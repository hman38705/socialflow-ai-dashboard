apiVersion: v1
kind: LimitRange
metadata:
  name: socialflow-prod-limitrange
  namespace: socialflow-prod
spec:
  limits:
    - type: Container
      # Applied to any container that omits requests/limits
      default:
        cpu: 1000m
        memory: 1Gi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 100m
        memory: 128Mi
