# ExternalSecret — syncs secrets from AWS Secrets Manager via External Secrets Operator.
# The ClusterSecretStore (cluster-secret-store.yaml) configures ESO authentication.
# This manifest references a secret in AWS Secrets Manager and creates a Kubernetes Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: socialflow-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: socialflow-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: socialflow/backend
        property: DATABASE_URL
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: socialflow/backend
        property: REDIS_PASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: socialflow/backend
        property: JWT_SECRET
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: socialflow/backend
        property: JWT_REFRESH_SECRET
    - secretKey: TWITTER_API_KEY
      remoteRef:
        key: socialflow/backend
        property: TWITTER_API_KEY
    - secretKey: TWITTER_API_SECRET
      remoteRef:
        key: socialflow/backend
        property: TWITTER_API_SECRET
