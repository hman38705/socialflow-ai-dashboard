apiVersion: v1
kind: LimitRange
metadata:
  name: socialflow-dev-limitrange
  namespace: socialflow-dev
spec:
  limits:
    - type: Container
      # Applied to any container that omits requests/limits
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: 500m
        memory: 512Mi
      min:
        cpu: 50m
        memory: 64Mi
